groups:
  - name: mybento-ops
    rules:
      - alert: MyBentoBackendDown
        expr: up{job="backend"} == 0
        for: 2m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: Backend caido
          description: El backend de MyBento no responde al scraping de Prometheus.

      - alert: MyBentoHighErrorRate
        expr: (sum(rate(mybento_http_requests_total{status_code=~"5.."}[5m])) / clamp_min(sum(rate(mybento_http_requests_total[5m])), 0.001)) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: Error rate alto
          description: La tasa de respuestas 5xx supera el 5% durante 5 minutos.

      - alert: MyBentoHighLatencyP95
        expr: histogram_quantile(0.95, sum by (le) (rate(mybento_http_request_duration_seconds_bucket[5m]))) > 1
        for: 10m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: Latencia p95 alta
          description: La latencia p95 del backend supera 1 segundo durante 10 minutos.

      - alert: MyBentoMenuMostlyEmpty
        expr: mybento_menu_fill_ratio < 0.2
        for: 30m
        labels:
          severity: info
          service: business
        annotations:
          summary: Menus con baja ocupacion
          description: Menos del 20% de los slots del menu estan rellenos.
