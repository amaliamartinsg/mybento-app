<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Components — Meal slots</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fef7fd;font-family:var(--mb-font-ui);color:var(--mb-fg);}
  .wrap{padding:18px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .lbl{grid-column:1/-1;font:700 10px var(--mb-font-ui);letter-spacing:.1em;text-transform:uppercase;color:#6a769e;}
  .slot{height:96px;border-radius:12px;padding:12px;}
  .filled{background:rgba(0,130,253,0.08);border:1px solid rgba(0,130,253,0.2);display:flex;align-items:center;}
  .filled span{font:700 11px/1.3 var(--mb-font-ui);color:#4da8ff;}
  .empty{border:2px dashed #c3c7d0;display:flex;align-items:center;justify-content:center;color:#c3c7d0;font-size:24px;}
  .pair{background:rgba(0,130,253,0.08);border:1px solid rgba(0,130,253,0.2);display:flex;flex-direction:column;justify-content:space-between;gap:6px;padding:10px 12px;}
  .course{display:flex;gap:6px;align-items:flex-start;}
  .course b{font:800 9px var(--mb-font-ui);color:#005cb2;}
  .course span{font:700 10px/1.3 var(--mb-font-ui);color:#4da8ff;}
  .sep{border-top:1px solid rgba(0,130,253,0.15);margin:0 -12px;}
</style></head><body>
<div class="wrap">
  <div class="lbl">Slot — lleno / vacío / primero+segundo</div>
  <div class="slot filled"><span>Salmón al horno con verduras asadas</span></div>
  <div class="slot empty">+</div>
  <div class="slot pair">
    <div class="course"><b>1°</b><span>Crema de calabaza</span></div>
    <div class="sep"></div>
    <div class="course"><b>2°</b><span>Pollo al limón</span></div>
  </div>
</div>
</body></html>
