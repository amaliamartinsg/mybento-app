<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Brand — Logo</title>
<style>
  html,body{margin:0;padding:0;background:#fef7fd;font-family:'Inter',sans-serif;color:#1a1c1e;}
  .wrap{padding:14px 20px;display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:center;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .cell.dark{background:#68548d;border-radius:14px;padding:12px;}
  .cell.light{padding:12px;}
  .cell img{height:48px;max-width:100%;object-fit:contain;}
  .dark img{filter:invert(1);mix-blend-mode:screen;}
  .lbl{font:700 10px/1.2 'Inter';letter-spacing:.1em;text-transform:uppercase;color:#6a769e;}
</style></head><body>
<div class="wrap">
  <div class="cell light"><img src="../assets/mybento-logo-simple.png"><div class="lbl">Wordmark · light</div></div>
  <div class="cell dark"><img src="../assets/mybento-logo-simple.png"><div class="lbl" style="color:#e8dff8">Wordmark · on brand</div></div>
</div>
</body></html>
