<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Colors — Macros</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--mb-surface);font-family:var(--mb-font-ui);}
  .wrap{padding:20px 24px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.05);}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .tag{font:700 10px/1 var(--mb-font-ui);padding:5px 10px;border-radius:999px;}
  .dot{width:16px;height:16px;border-radius:50%;}
  .name{font:700 12px/1.2 var(--mb-font-ui);color:var(--mb-fg);margin-top:6px;}
  .hex{font:500 10px/1.2 var(--mb-font-mono);color:var(--mb-fg-subtle);margin-top:2px;}
</style></head><body>
<div class="wrap"><div class="row">
  <div class="card"><div class="head"><span class="dot" style="background:#4da8ff"></span><span class="tag" style="background:rgba(0,130,253,0.1);color:#4da8ff">350 kcal</span></div><div class="name">Kcal</div><div class="hex">#4da8ff · bg 0.10α</div></div>
  <div class="card"><div class="head"><span class="dot" style="background:#1565C0"></span><span class="tag" style="background:rgba(21,101,192,0.1);color:#1565C0">P: 28g</span></div><div class="name">Proteínas</div><div class="hex">#1565C0 · bg 0.10α</div></div>
  <div class="card"><div class="head"><span class="dot" style="background:#F57F17"></span><span class="tag" style="background:rgba(245,127,23,0.1);color:#F57F17">HC: 45g</span></div><div class="name">Hidratos</div><div class="hex">#F57F17 · bg 0.10α</div></div>
  <div class="card"><div class="head"><span class="dot" style="background:#C62828"></span><span class="tag" style="background:rgba(198,40,40,0.1);color:#C62828">G: 12g</span></div><div class="name">Grasas</div><div class="hex">#C62828 · bg 0.10α</div></div>
</div></div>
</body></html>
