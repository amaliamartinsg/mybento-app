<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Spacing — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--mb-font-ui);color:var(--mb-fg);}
  .wrap{padding:18px 22px;display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:72px;height:64px;background:#eef2ff;box-shadow:inset 0 0 0 2px #4da8ff;}
  .label{font:700 11px/1.2 var(--mb-font-ui);}
  .val{font:500 10px var(--mb-font-mono);color:var(--mb-fg-subtle);}
</style></head><body>
<div class="wrap">
  <div class="cell"><div class="box" style="border-radius:8px"></div><div class="label">xs</div><div class="val">8</div></div>
  <div class="cell"><div class="box" style="border-radius:12px"></div><div class="label">sm</div><div class="val">12</div></div>
  <div class="cell"><div class="box" style="border-radius:16px"></div><div class="label">md</div><div class="val">16</div></div>
  <div class="cell"><div class="box" style="border-radius:24px"></div><div class="label">lg</div><div class="val">24</div></div>
  <div class="cell"><div class="box" style="border-radius:28px"></div><div class="label">xl</div><div class="val">28</div></div>
  <div class="cell"><div class="box" style="border-radius:32px"></div><div class="label">2xl</div><div class="val">32</div></div>
  <div class="cell"><div class="box" style="border-radius:9999px"></div><div class="label">pill</div><div class="val">∞</div></div>
</div>
</body></html>
