<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Type — Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--mb-font-ui);color:var(--mb-fg);}
  .wrap{padding:18px 24px;display:grid;gap:14px;}
  .row{display:grid;grid-template-columns:110px 1fr 140px;gap:16px;align-items:baseline;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06);}
  .row:last-child{border-bottom:none;}
  .name{font:700 12px/1.2 var(--mb-font-mono);color:var(--mb-fg-subtle);text-transform:uppercase;letter-spacing:.05em;}
  .sample-inter{font:800 22px/1.1 'Inter',sans-serif;letter-spacing:-0.02em;}
  .sample-lexend{font:700 22px/1.1 'Lexend',sans-serif;letter-spacing:-0.02em;}
  .role{font:500 11px/1.3 var(--mb-font-ui);color:var(--mb-fg-subtle);text-align:right;}
</style></head><body>
<div class="wrap">
  <div class="row"><div class="name">Inter</div><div class="sample-inter">Aa — Bento equilibrado</div><div class="role">UI · 95% de pantallas</div></div>
  <div class="row"><div class="name">Lexend</div><div class="sample-lexend">Aa — Bento equilibrado</div><div class="role">Marca · theme.ts, MUI default</div></div>
  <div class="row"><div class="name">Mono</div><div style="font:600 15px var(--mb-font-mono);">--mb-primary: #4da8ff</div><div class="role">Tokens / debug</div></div>
</div>
</body></html>
