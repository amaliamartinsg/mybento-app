<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Brand — Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--mb-font-ui);color:var(--mb-fg);}
  .wrap{padding:18px 22px;}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:12px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;color:#4da8ff;}
  .cell svg{width:26px;height:26px;}
  .cell small{font:500 9px var(--mb-font-mono);color:#6a769e;text-align:center;}
  .note{font:500 11px var(--mb-font-ui);color:#6a769e;margin-top:12px;}
</style></head><body>
<div class="wrap">
  <div class="grid">
    <div class="cell"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 3h3v8H4zM5 11v10h1V11zm5-8v6a2 2 0 0 0 2 2v10h1V11a2 2 0 0 0 2-2V3h-1v6h-1V3h-1v6h-1V3z"/></svg><small>restaurant</small></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2v2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2V2h-2v2H9V2zm12 8v10H5V10z"/></svg><small>calendar</small></div>

    <div class="cell"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M11 2v20h2V2zm-9 9v2h20v-2z"/></svg><small>add</small></div>
