<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Colors — Neutrals & Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--mb-surface);font-family:var(--mb-font-ui);}
  .wrap{padding:20px 24px;}
  .row{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;}
  .swatch{display:flex;flex-direction:column;gap:6px;}
  .chip{height:60px;border-radius:12px;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.04);}
  .name{font:700 11px/1.2 var(--mb-font-ui);color:var(--mb-fg);}
  .hex{font:500 10px/1.2 var(--mb-font-mono);color:var(--mb-fg-subtle);}
</style></head><body>
<div class="wrap">
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#1a1c1e"></div><div class="name">fg</div><div class="hex">#1a1c1e</div></div>
    <div class="swatch"><div class="chip" style="background:#44464f"></div><div class="name">fg-muted</div><div class="hex">#44464f</div></div>
    <div class="swatch"><div class="chip" style="background:#6a769e"></div><div class="name">fg-subtle</div><div class="hex">#6a769e</div></div>
    <div class="swatch"><div class="chip" style="background:#c3c7d0"></div><div class="name">fg-disabled</div><div class="hex">#c3c7d0</div></div>
    <div class="swatch"><div class="chip" style="background:#fef7fd"></div><div class="name">surface</div><div class="hex">#fef7fd</div></div>
    <div class="swatch"><div class="chip" style="background:#f8f9ff"></div><div class="name">surface-alt</div><div class="hex">#f8f9ff</div></div>
  </div>
</div>
</body></html>
