<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--mb-font-ui);color:var(--mb-fg);}
  .wrap{padding:18px 24px;display:grid;grid-template-columns:120px 1fr;gap:10px 18px;align-items:baseline;}
  .label{font:500 10px/1.2 var(--mb-font-mono);color:var(--mb-fg-subtle);padding-top:8px;text-transform:uppercase;letter-spacing:.05em;}
  .display{font:800 36px/1 var(--mb-font-ui);letter-spacing:-0.02em;color:var(--mb-primary);}
  .h1{font:800 24px/1.2 var(--mb-font-ui);letter-spacing:-0.02em;}
  .h2{font:800 18px/1.25 var(--mb-font-ui);letter-spacing:-0.02em;}
  .tab{font:700 15px/1.3 var(--mb-font-ui);color:var(--mb-primary);}
  .body{font:500 14px/1.6 var(--mb-font-ui);}
  .eyebrow{font:700 10px/1.2 var(--mb-font-ui);letter-spacing:.1em;text-transform:uppercase;color:var(--mb-fg-subtle);}
</style></head><body>
<div class="wrap">
  <div class="label">Display 800/36</div><div class="display">2.200</div>
  <div class="label">H1 800/24</div><div class="h1">Mi Perfil</div>
  <div class="label">H2 800/18</div><div class="h2">Ensalada César ligera</div>
  <div class="label">Tab 700/15</div><div class="tab">Recetas</div>
  <div class="label">Body 500/14</div><div class="body">Escribe los ingredientes que tienes y pulsa Enter.</div>
  <div class="label">Eyebrow 700/10</div><div class="eyebrow">SEMANA · LUN MAR MIÉ</div>
</div>
</body></html>
